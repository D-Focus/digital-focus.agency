<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Dark background -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#003c50" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="1"/>
    </radialGradient>
    <!-- Cyan glow for center -->
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="60%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.6"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGlow)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(0,229,255,0.12)" stroke-width="1"/>

  <!-- TOP-LEFT corner bracket -->
  <rect x="10" y="10" width="14" height="3.5" rx="1.75" fill="#00E5FF" filter="url(#glow)"/>
  <rect x="10" y="10" width="3.5" height="14" rx="1.75" fill="#00E5FF" filter="url(#glow)"/>

  <!-- TOP-RIGHT corner bracket -->
  <rect x="40" y="10" width="14" height="3.5" rx="1.75" fill="#00E5FF" filter="url(#glow)"/>
  <rect x="50.5" y="10" width="3.5" height="14" rx="1.75" fill="#00E5FF" filter="url(#glow)"/>

  <!-- BOTTOM-LEFT corner bracket -->
  <rect x="10" y="50.5" width="14" height="3.5" rx="1.75" fill="#00E5FF" filter="url(#glow)"/>
  <rect x="10" y="40" width="3.5" height="14" rx="1.75" fill="#00E5FF" filter="url(#glow)"/>

  <!-- BOTTOM-RIGHT corner bracket -->
  <rect x="40" y="50.5" width="14" height="3.5" rx="1.75" fill="#00E5FF" filter="url(#glow)"/>
  <rect x="50.5" y="40" width="3.5" height="14" rx="1.75" fill="#00E5FF" filter="url(#glow)"/>

  <!-- Center: outer ring -->
  <circle cx="32" cy="32" r="9" fill="none" stroke="rgba(0,229,255,0.25)" stroke-width="1.2"/>
  
  <!-- Center: crosshair lines -->
  <line x1="23" y1="32" x2="26" y2="32" stroke="#00E5FF" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="38" y1="32" x2="41" y2="32" stroke="#00E5FF" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="23" x2="32" y2="26" stroke="#00E5FF" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="38" x2="32" y2="41" stroke="#00E5FF" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>

  <!-- Center: glowing dot -->
  <circle cx="32" cy="32" r="5.5" fill="url(#dotGlow)" filter="url(#strongGlow)"/>
  <circle cx="32" cy="32" r="3" fill="#fff" opacity="0.9"/>
</svg>
