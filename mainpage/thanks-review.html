<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" type="image/svg+xml" href="favicon.ico/df-icon.svg">
<title>Благодарим за отзива! — Digital Focus</title>
<meta name="description" content="Благодарим за отзива! Вашето ревю е ценно за нас и помага на други да се запознаят с работата на Digital Focus."/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://digital-focus.agency/thanks-review.html"/>
<meta property="og:title" content="Благодарим за отзива! — Digital Focus"/>
<meta property="og:description" content="Благодарим за отзива! Вашето ревю е ценно за нас и помага на други да се запознаят с работата на Digital Focus."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{scroll-behavior:smooth}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#E0E0E0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}
.lang-btn{background:transparent;border:1px solid rgba(0,229,255,.3);color:#00E5FF;font-size:.7rem;font-weight:700;letter-spacing:.1em;padding:.3rem .7rem;border-radius:20px;cursor:pointer;transition:all .2s}
.lang-btn:hover{background:rgba(0,229,255,.1)}
.btn-thanks{display:inline-flex;align-items:center;gap:.5rem;background:linear-gradient(135deg,#00E5FF,#29B6F6);color:#0a0a0f;font-weight:700;font-size:1rem;padding:1rem 2rem;border-radius:9999px;text-decoration:none;transition:all .3s;box-shadow:0 4px 24px rgba(0,229,255,.25)}
.btn-thanks:hover{box-shadow:0 0 32px rgba(0,229,255,.5);transform:translateY(-2px) scale(1.02)}
.check-wrap{position:relative;margin:0 auto 1.5rem}
.check-wrap svg{filter:drop-shadow(0 0 40px rgba(34,197,94,.4))}
@keyframes check-pop{0%{opacity:0;transform:scale(0.5)}60%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
.check-wrap{animation:check-pop .6s cubic-bezier(.23,1,.32,1) forwards}
</style>
</head>
<body>

<!-- NAV -->
<nav style="backdrop-filter:blur(16px);background:rgba(10,10,15,.85);border-bottom:1px solid rgba(0,229,255,.08)" class="fixed top-0 left-0 right-0 z-50 px-6 md:px-12 py-4">
  <div class="max-w-4xl mx-auto flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-3">
      <svg width="28" height="28" viewBox="0 0 36 36" fill="none"><rect x="2" y="2" width="11" height="3" rx="1.5" fill="#00E5FF"/><rect x="2" y="2" width="3" height="11" rx="1.5" fill="#00E5FF"/><rect x="23" y="2" width="11" height="3" rx="1.5" fill="#00E5FF"/><rect x="31" y="2" width="3" height="11" rx="1.5" fill="#00E5FF"/><rect x="2" y="31" width="11" height="3" rx="1.5" fill="#00E5FF"/><rect x="2" y="25" width="3" height="11" rx="1.5" fill="#00E5FF"/><rect x="23" y="31" width="11" height="3" rx="1.5" fill="#00E5FF"/><rect x="31" y="25" width="3" height="11" rx="1.5" fill="#00E5FF"/><circle cx="18" cy="18" r="5" fill="#29B6F6"/></svg>
      <span class="text-white font-bold text-lg">D-<span style="color:#00E5FF">Focus</span></span>
    </a>
    <div class="flex items-center gap-4">
      <a href="index.html" class="text-sm text-gray-400 hover:text-white transition-colors" data-t="back_link">← Обратно към сайта</a>
      <button class="lang-btn" id="langToggle">EN</button>
    </div>
  </div>
</nav>

<main class="w-full max-w-xl mx-auto px-6 py-24 md:py-32 text-center">
  <div class="check-wrap">
    <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="60" cy="60" r="56" fill="url(#green-grad)" opacity="0.15"/>
      <circle cx="60" cy="60" r="48" stroke="url(#green-grad)" stroke-width="3" fill="none"/>
      <path d="M38 60l14 14 32-32" stroke="url(#green-grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <defs>
        <linearGradient id="green-grad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
          <stop stop-color="#22c55e"/>
          <stop offset="1" stop-color="#16a34a"/>
        </linearGradient>
      </defs>
    </svg>
  </div>
  <h1 class="text-4xl md:text-5xl font-black text-white mb-4 tracking-tight" data-t="heading">Благодарим за отзива!</h1>
  <p class="text-gray-400 text-lg md:text-xl leading-relaxed max-w-md mx-auto mb-10" data-t="subtext">Вашето ревю е ценно за нас и помага на други да се запознаят с нашата работа. Оценяваме обратната връзка!</p>
  <a href="index.html" class="btn-thanks" data-t="btn">Обратно към началната страница</a>
</main>

<script>
const T = {
  bg: {
    heading: 'Благодарим за отзива!',
    subtext: 'Вашето ревю е ценно за нас и помага на други да се запознаят с нашата работа. Оценяваме обратната връзка!',
    btn: 'Обратно към началната страница',
    back_link: '← Обратно към сайта'
  },
  en: {
    heading: 'Thank you for your review!',
    subtext: 'Your review is valuable to us and helps others discover our work. We appreciate your feedback!',
    btn: 'Back to home page',
    back_link: '← Back to site'
  }
};
let lang = 'bg';
function setLang(l) {
  lang = l;
  const t = T[l];
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    if (t[key] !== undefined) el.textContent = t[key];
  });
  document.getElementById('langToggle').textContent = lang === 'bg' ? 'EN' : 'БГ';
  document.documentElement.lang = lang;
  document.title = lang === 'bg' ? 'Благодарим за отзива! — Digital Focus' : 'Thank you for your review! — Digital Focus';
}
document.getElementById('langToggle').addEventListener('click', () => setLang(lang === 'bg' ? 'en' : 'bg'));
</script>
</body>
</html>
