<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradients -->
    <radialGradient id="bgRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#003c50" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#29B6F6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coreGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip -->
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="175"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="195" fill="url(#bgRadial)"/>
  <circle cx="200" cy="200" r="195" fill="none" stroke="rgba(0,229,255,0.08)" stroke-width="1"/>

  <!-- Grid lines inside circle -->
  <g clip-path="url(#circleClip)" opacity="0.06">
    <line x1="25" y1="100" x2="375" y2="100" stroke="#00E5FF" stroke-width="1"/>
    <line x1="25" y1="150" x2="375" y2="150" stroke="#00E5FF" stroke-width="1"/>
    <line x1="25" y1="200" x2="375" y2="200" stroke="#00E5FF" stroke-width="1"/>
    <line x1="25" y1="250" x2="375" y2="250" stroke="#00E5FF" stroke-width="1"/>
    <line x1="25" y1="300" x2="375" y2="300" stroke="#00E5FF" stroke-width="1"/>
    <line x1="100" y1="25" x2="100" y2="375" stroke="#00E5FF" stroke-width="1"/>
    <line x1="150" y1="25" x2="150" y2="375" stroke="#00E5FF" stroke-width="1"/>
    <line x1="200" y1="25" x2="200" y2="375" stroke="#00E5FF" stroke-width="1"/>
    <line x1="250" y1="25" x2="250" y2="375" stroke="#00E5FF" stroke-width="1"/>
    <line x1="300" y1="25" x2="300" y2="375" stroke="#00E5FF" stroke-width="1"/>
  </g>

  <!-- Orbit rings -->
  <circle cx="200" cy="200" r="130" fill="none" stroke="rgba(0,229,255,0.10)" stroke-width="1" stroke-dasharray="6 4">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="30s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="200" r="100" fill="none" stroke="rgba(41,182,246,0.12)" stroke-width="1" stroke-dasharray="3 6">
    <animateTransform attributeName="transform" type="rotate" from="360 200 200" to="0 200 200" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="200" r="158" fill="none" stroke="rgba(0,229,255,0.06)" stroke-width="1"/>

  <!-- Orbiting dots on outer ring -->
  <g>
    <circle r="5" fill="#00E5FF" filter="url(#glow)" opacity="0.9">
      <animateMotion dur="30s" repeatCount="indefinite">
        <mpath href="#orbitPath1"/>
      </animateMotion>
    </circle>
  </g>
  <path id="orbitPath1" d="M 200 70 A 130 130 0 1 1 199.99 70" fill="none"/>

  <g>
    <circle r="3.5" fill="#29B6F6" filter="url(#glow)" opacity="0.8">
      <animateMotion dur="20s" repeatCount="indefinite" keyPoints="0.5;1;0;0.5" keyTimes="0;0.33;0.66;1" calcMode="linear">
        <mpath href="#orbitPath2"/>
      </animateMotion>
    </circle>
  </g>
  <path id="orbitPath2" d="M 200 100 A 100 100 0 1 1 199.99 100" fill="none"/>

  <!-- Corner brackets (matching navbar logo style) -->
  <!-- Top-left -->
  <rect x="30" y="30" width="28" height="5" rx="2.5" fill="#00E5FF" opacity="0.7" filter="url(#glow)"/>
  <rect x="30" y="30" width="5" height="28" rx="2.5" fill="#00E5FF" opacity="0.7" filter="url(#glow)"/>
  <!-- Top-right -->
  <rect x="342" y="30" width="28" height="5" rx="2.5" fill="#00E5FF" opacity="0.7" filter="url(#glow)"/>
  <rect x="365" y="30" width="5" height="28" rx="2.5" fill="#00E5FF" opacity="0.7" filter="url(#glow)"/>
  <!-- Bottom-left -->
  <rect x="30" y="365" width="28" height="5" rx="2.5" fill="#00E5FF" opacity="0.7" filter="url(#glow)"/>
  <rect x="30" y="342" width="5" height="28" rx="2.5" fill="#00E5FF" opacity="0.7" filter="url(#glow)"/>
  <!-- Bottom-right -->
  <rect x="342" y="365" width="28" height="5" rx="2.5" fill="#00E5FF" opacity="0.7" filter="url(#glow)"/>
  <rect x="365" y="342" width="5" height="28" rx="2.5" fill="#00E5FF" opacity="0.7" filter="url(#glow)"/>

  <!-- Scanning line animation -->
  <g clip-path="url(#circleClip)">
    <rect x="25" y="0" width="350" height="2" fill="url(#lineGrad)" opacity="0.6">
      <animate attributeName="y" from="30" to="370" dur="4s" repeatCount="indefinite" ease="linear"/>
      <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.1;0.9;1" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Central monitor/screen -->
  <rect x="140" y="148" width="120" height="82" rx="8" fill="#0d1117" stroke="rgba(0,229,255,0.3)" stroke-width="1.5"/>
  <!-- Screen glow -->
  <rect x="140" y="148" width="120" height="82" rx="8" fill="none" stroke="#00E5FF" stroke-width="0.5" opacity="0.4" filter="url(#softGlow)"/>
  <!-- Screen stand -->
  <rect x="190" y="230" width="20" height="10" rx="2" fill="#1a2535"/>
  <rect x="178" y="239" width="44" height="5" rx="2.5" fill="#1a2535" stroke="rgba(0,229,255,0.2)" stroke-width="1"/>

  <!-- Screen content: code lines -->
  <rect x="152" y="162" width="55" height="4" rx="2" fill="#00E5FF" opacity="0.7"/>
  <rect x="152" y="172" width="38" height="4" rx="2" fill="rgba(41,182,246,0.5)"/>
  <rect x="152" y="182" width="70" height="4" rx="2" fill="rgba(41,182,246,0.3)"/>
  <rect x="152" y="192" width="48" height="4" rx="2" fill="rgba(0,229,255,0.4)"/>
  <rect x="152" y="202" width="62" height="4" rx="2" fill="rgba(41,182,246,0.25)"/>
  <!-- Blinking cursor -->
  <rect x="152" y="212" width="8" height="4" rx="1" fill="#00E5FF">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating code brackets top-left of screen -->
  <text x="118" y="172" font-family="monospace" font-size="22" fill="#00E5FF" opacity="0.25">{</text>
  <text x="268" y="215" font-family="monospace" font-size="22" fill="#00E5FF" opacity="0.25">}</text>

  <!-- Node dots around screen connected by lines -->
  <!-- Node 1: top -->
  <line x1="200" y1="100" x2="200" y2="148" stroke="rgba(0,229,255,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="200" cy="96" r="5" fill="#111827" stroke="#00E5FF" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="200" cy="96" r="2.5" fill="#00E5FF"/>

  <!-- Node 2: bottom -->
  <line x1="200" y1="244" x2="200" y2="270" stroke="rgba(0,229,255,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="200" cy="275" r="5" fill="#111827" stroke="#00E5FF" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="200" cy="275" r="2.5" fill="#00E5FF"/>

  <!-- Node 3: left -->
  <line x1="140" y1="189" x2="110" y2="189" stroke="rgba(0,229,255,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="105" cy="189" r="5" fill="#111827" stroke="#00E5FF" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="105" cy="189" r="2.5" fill="#00E5FF"/>

  <!-- Node 4: right -->
  <line x1="260" y1="189" x2="292" y2="189" stroke="rgba(0,229,255,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="297" cy="189" r="5" fill="#111827" stroke="#00E5FF" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="297" cy="189" r="2.5" fill="#00E5FF"/>

  <!-- Pulsing center glow behind screen -->
  <circle cx="200" cy="189" r="45" fill="rgba(0,229,255,0.03)" filter="url(#coreGlow)">
    <animate attributeName="r" values="40;50;40" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating tags -->
  <!-- Tag: </> top right -->
  <rect x="290" y="115" width="58" height="24" rx="6" fill="#111827" stroke="rgba(0,229,255,0.2)" stroke-width="1">
    <animate attributeName="y" values="115;109;115" dur="3.5s" repeatCount="indefinite"/>
  </rect>
  <text x="298" y="132" font-family="monospace" font-size="12" fill="#00E5FF" opacity="0.8">
    <animate attributeName="y" values="132;126;132" dur="3.5s" repeatCount="indefinite"/>
    &lt;/&gt;
  </text>

  <!-- Tag: AI top left -->
  <rect x="52" y="120" width="44" height="24" rx="6" fill="#111827" stroke="rgba(41,182,246,0.2)" stroke-width="1">
    <animate attributeName="y" values="120;114;120" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="61" y="137" font-family="monospace" font-size="12" fill="#29B6F6" opacity="0.8">
    <animate attributeName="y" values="137;131;137" dur="4s" repeatCount="indefinite"/>
    AI
  </text>

  <!-- Tag: UX bottom left -->
  <rect x="55" y="255" width="44" height="24" rx="6" fill="#111827" stroke="rgba(0,229,255,0.15)" stroke-width="1">
    <animate attributeName="y" values="255;261;255" dur="3.8s" repeatCount="indefinite"/>
  </rect>
  <text x="63" y="272" font-family="monospace" font-size="12" fill="#00E5FF" opacity="0.7">
    <animate attributeName="y" values="272;278;272" dur="3.8s" repeatCount="indefinite"/>
    UX
  </text>

  <!-- Tag: SEO bottom right -->
  <rect x="292" y="258" width="52" height="24" rx="6" fill="#111827" stroke="rgba(41,182,246,0.15)" stroke-width="1">
    <animate attributeName="y" values="258;264;258" dur="4.2s" repeatCount="indefinite"/>
  </rect>
  <text x="299" y="275" font-family="monospace" font-size="12" fill="#29B6F6" opacity="0.7">
    <animate attributeName="y" values="275;281;275" dur="4.2s" repeatCount="indefinite"/>
    SEO
  </text>

  <!-- Outer faint ring pulse -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="rgba(0,229,255,0.05)" stroke-width="1">
    <animate attributeName="r" values="175;180;175" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
